<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Curated Life Itinerary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#FAF9F6] text-[#2C2A29] min-h-screen">

    <header class="border-b border-[#E5E4E2] bg-white/80 backdrop-blur px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 onclick="showCalendarView()" class="serif text-xl font-semibold tracking-wide text-[#1A1A1A] cursor-pointer hover:opacity-70 transition">THE CURATED REALITY</h1>
        <!-- INTERACTIVE GLOBAL STATE DROPDOWN -->
        <div class="flex items-center gap-1.5 bg-[#E6DFD3] text-[#5C5346] px-3 py-1.5 rounded-full text-xs tracking-widest uppercase font-medium border border-transparent hover:border-[#C5A059] transition">
            <select id="state-selector" onchange="updateGlobalState()" 
                class="bg-transparent text-[#5C5346] uppercase font-medium focus:outline-none cursor-pointer tracking-widest pr-2">
                <option value="Master of Manifestation" selected>Master of Manifestation</option>
                <option value="Master Architect">Master Architect</option>
                <option value="Quantum Traveler">Quantum Traveler</option>
                <option value="Divine Observer">Divine Observer</option>
                <option value="Pure Alignment">Pure Alignment</option>
            </select>
        </div>
    </header>

    <section id="calendar-view" class="max-w-4xl mx-auto px-4 py-12">
        <div class="text-center space-y-3 mb-12">
            <h2 class="serif text-4xl italic text-[#3A3329]">Select Your Destination Date</h2>
            <p class="text-xs tracking-widest text-gray-400 uppercase">Every day is a curated journey. Where are we traveling next?</p>
        </div>

        <div class="bg-white border border-[#E5E4E2] rounded-2xl p-6 shadow-sm space-y-6">
            <div class="flex justify-between items-center border-b border-gray-100 pb-4">
                <button onclick="changeMonth(-1)" class="text-gray-400 hover:text-black font-medium px-2">← Prev</button>
                <h3 id="calendar-month-year" class="serif text-xl font-medium text-[#1A1A1A]">June 2026</h3>
                <button onclick="changeMonth(1)" class="text-gray-400 hover:text-black font-medium px-2">Next →</button>
            </div>

            <div class="grid grid-cols-7 gap-2 text-center text-xs tracking-wider font-semibold text-gray-400 uppercase">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center"></div>
        </div>
    </section>

    <section id="day-view" class="max-w-6xl mx-auto px-4 py-10 hidden">
        <button onclick="showCalendarView()" class="text-xs tracking-wider text-gray-400 hover:text-black uppercase mb-6 flex items-center gap-1 transition">
            ← Return to Calendar Overview
        </button>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <!-- DYNAMIC DAILY MANIFESTATION BUBBLE -->
                <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-2 border-b border-[#E5E4E2] pb-3">
                    <h2 id="selected-date-heading" class="serif text-2xl italic text-[#3A3329]">24/6 Tue Paris</h2>
                    <div class="flex items-center gap-2 min-h-[32px]" id="manifestation-container">
                        </div>
                </div>

                <div class="bg-white border border-[#E5E4E2] p-5 rounded-xl shadow-sm space-y-4">
                    <p class="text-xs uppercase tracking-wider font-semibold text-gray-500">Book Next Destination</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div>
                            <label class="block text-[10px] text-gray-400 uppercase font-medium mb-1">Time (24H)</label>
                            <input type="text" id="iti-time" placeholder="e.g., 09:30-10:15" 
                                class="w-full bg-[#FAF9F6] border border-[#E5E4E2] rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:border-[#C5A059]">
                        </div>
                        <div class="col-span-2 md:col-span-2">
                            <label class="block text-[10px] text-gray-400 uppercase font-medium mb-1">Activity / Experience</label>
                            <input type="text" id="iti-activity" placeholder="e.g., Breakfast at Ritz Paris Le Comptoir" 
                                class="w-full bg-[#FAF9F6] border border-[#E5E4E2] rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:border-[#C5A059]">
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-400 uppercase font-medium mb-1">State</label>
                            <input type="text" id="iti-state" placeholder="e.g., Focus/Calm" 
                                class="w-full bg-[#FAF9F6] border border-[#E5E4E2] rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:border-[#C5A059]">
                        </div>
                    </div>
                    <div class="flex justify-end gap-2 pt-2 border-t border-gray-50">
                        <button onclick="clearItinerary()" class="text-xs text-gray-400 hover:text-red-500 transition mr-auto">Clear All</button>
                        <button onclick="addItineraryItem()" class="bg-[#2C2A29] text-white px-4 py-1.5 rounded-lg text-xs font-medium hover:bg-[#4A4744] transition">
                            Confirm
                        </button>
                    </div>
                </div>

                <div class="space-y-3" id="timeline-container"></div>
            </div>

            <div class="space-y-6">
                <div class="border-b border-[#E5E4E2] pb-2">
                    <h2 class="serif text-2xl italic text-[#3A3329]">Accomplishments</h2>
                </div>

                <div class="bg-white border border-[#E5E4E2] p-4 rounded-xl shadow-sm space-y-3">
                    <label class="text-xs uppercase tracking-wider font-semibold text-gray-500 block">What did you achieve today?</label>
                    <div class="flex gap-2">
                        <input type="text" id="task-input" placeholder="e.g., I am proud of myself that I've finished my writing." 
                            class="w-full bg-[#FAF9F6] border border-[#E5E4E2] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#C5A059]">
                        <button onclick="addAccomplishment()" class="bg-[#2C2A29] text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#4A4744] transition">
                            Script
                        </button>
                    </div>
                </div>

                <ul class="space-y-2.5" id="accomplishments-list"></ul>

                <div class="space-y-6 pt-6 border-t border-[#E5E4E2]/60">
                    <div class="border-b border-[#E5E4E2] pb-2">
                        <h2 class="serif text-2xl italic text-[#3A3329]">Reminders</h2>
                    </div>
                
                    <div class="bg-white border border-[#E5E4E2] p-4 rounded-xl shadow-sm space-y-3">
                        <label class="text-xs uppercase tracking-wider font-semibold text-gray-500 block">Add a note for this day:</label>
                        <div class="flex gap-2">
                            <input type="text" id="reminder-input" placeholder="e.g., Charity event 7pm" 
                                class="w-full bg-[#FAF9F6] border border-[#E5E4E2] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#C5A059]">
                            <button onclick="addReminder()" class="bg-[#2C2A29] text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#4A4744] transition">
                                Add
                            </button>
                        </div>
                    </div>
                
                    <ul class="space-y-2.5" id="reminders-list"></ul>
                </div>

                <div class="space-y-6 pt-6 border-t border-[#E5E4E2]/60">
                    <div class="border-b border-[#E5E4E2] pb-2">
                        <h2 class="serif text-2xl italic text-[#3A3329]">Affirmations</h2>
                    </div>
                
                    <div class="bg-white border border-[#E5E4E2] p-4 rounded-xl shadow-sm space-y-3">
                        <div class="flex justify-between items-center">
                            <label class="text-xs uppercase tracking-wider font-semibold text-gray-500 block">Write your affirmation here:</label>
                            <div id="affirmation-timer-display" class="text-xs font-mono font-semibold text-[#C5A059] bg-amber-50/50 px-2 py-0.5 rounded-full hidden">
                                10:00 Remaining
                            </div>
                        </div>
                        
                        <div id="affirmation-interactive-zone" class="flex gap-2">
                            <input type="text" id="affirmation-input" placeholder="Wavering? Affirm for 10 minutes." 
                                class="w-full bg-[#FAF9F6] border border-[#E5E4E2] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#C5A059]">
                            <button onclick="startAffirmationTimer()" id="affirmation-btn" class="bg-[#2C2A29] text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#4A4744] transition flex-shrink-0">
                                Lock In
                            </button>
                        </div>
                    </div>
                    <ul class="space-y-2.5 mt-3" id="affirmation-history-list"></ul>
                </div>

            </div> </main>
    </section>

    <script>
        let currentYear = 2026;
        let currentMonth = 5; 
        let selectedDateString = ""; 
        let globalIdentityState = "Master of Manifestation";

        // LOCAL STORAGE LOAD AND INITIALIZATION
        let appData = JSON.parse(localStorage.getItem('curatedAppData')) || {
            "2026-06-24": {
                itinerary: [
                    { time: "08:00-08:30", activity: "Make coffee", state: "Calm" },
                ],
                achievements: ["I am so happy I've done grocery shopping."],
                reminders: [],
                manifestation: ""
            }
        };

        const monthNames = [
            "January", "February", "March", "April", "May", "June", 
            "July", "August", "September", "October", "November", "December"
        ];

        // Central data persistence synchronization trigger
        function syncData() {
            localStorage.setItem('curatedAppData', JSON.stringify(appData));
        }

        // --- CALENDAR GENERATION ENGINE (CLEAN DOTS & CURRENT DAY SYNCHRONIZATION) ---
        function renderCalendar() {
            document.getElementById('calendar-month-year').innerText = `${monthNames[currentMonth]} ${currentYear}`;
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Get today's real date elements to check against
            const today = new Date();
            const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            for (let i = 0; i < firstDayIndex; i++) {
                grid.innerHTML += `<div></div>`;
            }

            for (let day = 1; day <= totalDays; day++) {
                const dateKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayData = appData[dateKey];
                
                const hasItineraryOrTask = dayData && ((dayData.itinerary && dayData.itinerary.length > 0) || (dayData.achievements && dayData.achievements.length > 0));
                const remindersArray = dayData && dayData.reminders ? dayData.reminders : [];

                // 1. Core structural activity indicator (Itinerary/Accomplishments)
                const activityDotHtml = hasItineraryOrTask ? `<span class="w-1 h-1 bg-[#2C2A29] rounded-full"></span>` : '';

                // 2. Reminder Dot State Logic (Solid vs Hollow)
                let reminderDotHtml = '';
                if (remindersArray.length > 0) {
                    // Check if every single reminder object has done set to true
                    const allDone = remindersArray.every(rem => typeof rem === 'object' && rem.done === true);
                    
                    if (allDone) {
                        // Hollow ring marker if everything is finished
                        reminderDotHtml = `<span class="w-2 h-2 border border-[#C5A059] rounded-full inline-block bg-transparent" title="All reminders completed"></span>`;
                    } else {
                        // Solid gold dot marker if there are still active items left
                        reminderDotHtml = `<span class="w-2 h-2 bg-[#C5A059] rounded-full inline-block" title="Active reminders pending"></span>`;
                    }
                }

                // 3. Current Day Highlight State
                const isToday = dateKey === todayKey;
                const todayMarkerHtml = isToday ? `<span class="w-1.5 h-1.5 bg-red-400 rounded-full absolute top-1.5 right-1.5" title="Today"></span>` : '';
                const todayCardStyle = isToday ? 'border-red-200 bg-red-50/20' : 'border-[#E5E4E2] bg-[#FAF9F6]';

                grid.innerHTML += `
                    <button onclick="selectDate('${dateKey}', ${day})" 
                        class="${todayCardStyle} border hover:border-[#C5A059] h-14 w-full text-sm rounded-xl transition duration-150 flex flex-col items-center justify-center relative group shadow-sm">
                        ${todayMarkerHtml}
                        <span class="group-hover:text-[#C5A059] text-gray-600 font-mono font-medium">${day}</span>
                        <div class="flex gap-1 items-center justify-center mt-1 min-h-[8px]">
                            ${activityDotHtml}
                            ${reminderDotHtml}
                        </div>
                    </button>
                `;
            }
        }

        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function selectDate(dateKey, dayNumber) {
            selectedDateString = dateKey;
            
            const dayOfWeek = new Date(currentYear, currentMonth, dayNumber).toLocaleDateString('en-US', { weekday: 'short' });
            document.getElementById('selected-date-heading').innerText = `${dayNumber}/${currentMonth + 1} ${dayOfWeek}`;

            if (!appData[selectedDateString]) {
                appData[selectedDateString] = { itinerary: [], achievements: [], reminders: [], manifestation: "" };
            }
            
            // --- UPDATE THIS LINE HERE ---
            renderManifestationBubble(); // Instead of setting .value directly, call the bubble controller!

            document.getElementById('calendar-view').classList.add('hidden');
            document.getElementById('day-view').classList.remove('hidden');

            renderItinerary();
            renderAccomplishments();
            renderReminders();
            renderAffirmationLogs();
        }

        // DYNAMIC MANIFESTATION BUBBLE LOGIC
        // --- DYNAMIC MANIFESTATION BUBBLE LIFECYCLE CONTROLLERS ---
        function renderManifestationBubble() {
            const container = document.getElementById('manifestation-container');
            if (!container) return;
            
            const savedText = appData[selectedDateString].manifestation || "";

            // State A: If no text is stored yet, present the clean editing input layout
            if (!savedText) {
                container.innerHTML = `
                    <span class="text-[10px] uppercase tracking-wider font-semibold text-gray-400">Manifestation of the day:</span>
                    <input type="text" id="daily-manifestation-input" placeholder="e.g., I am always rich and pretty." 
                        class="bg-transparent border-b border-dashed border-[#C5A059] text-sm text-amber-800 font-medium italic focus:outline-none focus:border-amber-900 px-1 py-0.5 placeholder-gray-300 w-52"
                        onkeypress="handleManifestationKey(event)"
                        onblur="saveManifestationText()">
                `;
            } else {
                // State B: Once saved, transform instantly into an elegant reality bubble frame
                container.innerHTML = `
                    <span class="text-[10px] uppercase tracking-wider font-semibold text-gray-400">Manifestation of the day:</span>
                    <div onclick="editManifestation()" 
                        class="bg-[#FAF9F6] border border-[#C5A059] text-amber-800 text-xs font-medium italic px-3 py-1 rounded-full shadow-sm cursor-pointer hover:bg-amber-50/40 hover:border-amber-700 transition flex items-center gap-2 select-none"
                        title="Click to edit statement">
                        <span>${savedText}</span>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
                            class="w-3 h-3 text-[#C5A059] hover:text-amber-800 transition flex-shrink-0">
                            <path d="M12 20h9"></path>
                            <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
                        </svg>
                    </div>
                `;
            }
        }

        function saveManifestationText() {
            const input = document.getElementById('daily-manifestation-input');
            if (!input) return;
            
            const inputVal = input.value.trim();
            if (inputVal) {
                appData[selectedDateString].manifestation = inputVal;
                syncData();          // Keep data saved in LocalStorage
                renderCalendar();    // Redraw calendar dots if needed
            }
            renderManifestationBubble(); // Lock into a beautiful bubble frame
        }

        function handleManifestationKey(e) {
            if (e.key === 'Enter') {
                saveManifestationText();
            }
        }

        function editManifestation() {
            const currentText = appData[selectedDateString].manifestation;
            // Clear value temporarily to trick the engine into drawing the text input state box
            appData[selectedDateString].manifestation = ""; 
            renderManifestationBubble();
            
            const input = document.getElementById('daily-manifestation-input');
            if (input) {
                input.value = currentText;
                input.focus(); // Pull up keyboard cursor immediately for your mobile phone!
            }
        }

        function showCalendarView() {
            document.getElementById('day-view').classList.add('hidden');
            document.getElementById('calendar-view').classList.remove('hidden');
            renderCalendar(); 
        }

        function renderItinerary() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';
            const items = appData[selectedDateString].itinerary;

            if (items.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-400 italic text-sm bg-white border border-dashed rounded-xl">No destinations booked for this day yet.</div>`;
                return;
            }

            items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="bg-white border border-[#E5E4E2] p-4 rounded-xl shadow-sm flex justify-between items-center transition hover:border-[#D4AF37]">
                        <div class="flex items-center gap-4 min-w-0 flex-1">
                            <span class="text-xs font-mono font-semibold tracking-wider text-gray-500 bg-gray-50 px-2 py-1 rounded w-[85px] flex-shrink-0 text-center">${item.time}</span>
                            <div class="min-w-0">
                                <p class="font-medium text-[#1A1A1A] text-sm truncate">${item.activity}</p>
                                <p class="text-xs text-amber-700 font-medium italic mt-0.5 truncate">${item.state ? `[${item.state}]` : ''}</p>
                            </div>
                        </div>
                        <button onclick="deleteItineraryItem(${index})" class="text-gray-300 hover:text-red-400 text-xs px-2 py-1 flex-shrink-0 ml-2">✕</button>
                    </div>`;
            });
        }

        function renderAccomplishments() {
            const listContainer = document.getElementById('accomplishments-list');
            listContainer.innerHTML = '';
            const items = appData[selectedDateString].achievements;

            items.forEach((item, index) => {
                listContainer.innerHTML += `
                    <li class="bg-white border border-[#E5E4E2] p-3 rounded-xl flex items-center justify-between shadow-sm text-sm group transition-all">
                        <span class="text-gray-700 font-medium leading-tight mr-2">${item}</span>
                        <button onclick="removeAccomplishment(${index})" 
                            class="text-gray-300 hover:text-red-400 text-xs px-2 py-1 transition flex-shrink-0">
                            ✕
                        </button>
                    </li>`;
            });
        }

        function addItineraryItem() {
            const timeInput = document.getElementById('iti-time');
            const activityInput = document.getElementById('iti-activity');
            const stateInput = document.getElementById('iti-state');

            if (!timeInput.value || !activityInput.value) return;

            appData[selectedDateString].itinerary.push({
                time: timeInput.value.trim(),
                activity: activityInput.value.trim(),
                state: stateInput.value.trim()
            });

            // CHRONOLOGICAL SORTING
            appData[selectedDateString].itinerary.sort((a, b) => {
                const timeA = a.time.split(/[- ]/)[0].trim();
                const timeB = b.time.split(/[- ]/)[0].trim();
                const normalize = (t) => t.replace(':', '').padStart(4, '0');
                return normalize(timeA).localeCompare(normalize(timeB));
            });

            syncData();
            timeInput.value = ''; activityInput.value = ''; stateInput.value = '';
            renderItinerary();
        }

        function deleteItineraryItem(index) {
            appData[selectedDateString].itinerary.splice(index, 1);
            syncData();
            renderItinerary();
        }

        function clearItinerary() {
            if(confirm("Clear this day's active plan?")) {
                appData[selectedDateString].itinerary = [];
                syncData();
                renderItinerary();
            }
        }

        function addAccomplishment() {
            const input = document.getElementById('task-input');
            const taskText = input.value.trim();
            if (taskText === '') return;

            appData[selectedDateString].achievements.unshift(taskText);
            syncData();
            input.value = '';
            renderAccomplishments();
        }

        function removeAccomplishment(index) {
            appData[selectedDateString].achievements.splice(index, 1);
            syncData();
            renderAccomplishments();
        }

        document.getElementById('task-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addAccomplishment();
        });

        function renderReminders() {
            const listContainer = document.getElementById('reminders-list');
            listContainer.innerHTML = '';
            
            if (!appData[selectedDateString].reminders) {
                appData[selectedDateString].reminders = [];
            }
            
            const items = appData[selectedDateString].reminders;

            items.forEach((item, index) => {
                const isDone = typeof item === 'object' ? item.done : false;
                const textContent = typeof item === 'object' ? item.text : item;
                const textStyle = isDone ? 'text-gray-400 line-through font-normal' : 'text-gray-700 font-medium';

                listContainer.innerHTML += `
                    <li class="bg-white border border-[#E5E4E2] p-3 rounded-xl flex items-start justify-between shadow-sm text-sm group transition-all">
                        <div class="flex items-start gap-3 flex-1 mr-2">
                            <input type="checkbox" ${isDone ? 'checked' : ''} onclick="toggleReminder(${index})" 
                                class="mt-1 h-4 w-4 accent-[#C5A059] border-gray-300 rounded cursor-pointer transition">
                            <span class="${textStyle} leading-tight transition-all">${textContent}</span>
                        </div>
                        <button onclick="removeReminder(${index})" 
                            class="text-gray-300 hover:text-red-400 text-xs px-1 mt-0.5 transition opacity-0 group-hover:opacity-100" title="Delete permanently">
                            ✕
                        </button>
                    </li>`;
            });
        }

        function addReminder() {
            const input = document.getElementById('reminder-input');
            const reminderText = input.value.trim();
            if (reminderText === '') return;

            if (!appData[selectedDateString].reminders) {
                appData[selectedDateString].reminders = [];
            }

            appData[selectedDateString].reminders.push({ text: reminderText, done: false });
            syncData();
            input.value = '';
            renderReminders();
        }

        function toggleReminder(index) {
            const item = appData[selectedDateString].reminders[index];
            if (typeof item === 'object') {
                item.done = !item.done;
            } else {
                appData[selectedDateString].reminders[index] = { text: item, done: true };
            }
            syncData();
            renderReminders();
        }

        function removeReminder(index) {
            appData[selectedDateString].reminders.splice(index, 1);
            syncData();
            renderReminders();
        }

        function updateGlobalState() {
            const selectedVal = document.getElementById('state-selector').value;
            globalIdentityState = selectedVal;
            // State can also be saved if needed, or left dynamic per session
            localStorage.setItem('curatedGlobalState', globalIdentityState);
        }

        // --- AFFIRMATION ENGINE WITH ISOLATED LOGS & CANCEL STATES ---
        let affirmationCountdownInterval = null;
        let currentActiveAffirmation = "";

        function startAffirmationTimer() {
            const input = document.getElementById('affirmation-input');
            const timerDisplay = document.getElementById('affirmation-timer-display');
            const zone = document.getElementById('affirmation-interactive-zone');
            
            if (!input || !input.value.trim()) return;
            currentActiveAffirmation = input.value.trim();

            // Switch view state to show active meditation/affirmation progress & a cancel button
            timerDisplay.classList.remove('hidden');
            zone.innerHTML = `
                <div class="w-full bg-amber-50/30 border border-dashed border-[#C5A059]/40 rounded-xl p-4 text-center space-y-3">
                    <div>
                        <p class="text-[10px] uppercase tracking-widest text-gray-400 font-medium mb-1">Affirming</p>
                        <p class="text-sm font-medium text-amber-900 italic">"${currentActiveAffirmation}"</p>
                    </div>
                    <button onclick="cancelAffirmationTimer()" class="text-xs text-gray-400 hover:text-red-500 transition px-3 py-1 bg-white border border-gray-200 rounded-full shadow-xs">
                        Cancel Session
                    </button>
                </div>
            `;

            let totalSeconds = 10 * 60; // 10 minutes flat
            if (affirmationCountdownInterval) clearInterval(affirmationCountdownInterval);

            affirmationCountdownInterval = setInterval(() => {
                totalSeconds--;
                const mins = Math.floor(totalSeconds / 60);
                const secs = totalSeconds % 60;
                timerDisplay.innerText = `${mins}:${String(secs).padStart(2, '0')} Remaining`;

                if (totalSeconds <= 0) {
                    clearInterval(affirmationCountdownInterval);
                    
                    // 1. Calculate time stamp parameters safely
                    const now = new Date();
                    const timestampStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                    
                    // 2. Initialize the daily affirmation history array safely if it doesn't exist
                    if (!appData[selectedDateString].affirmationLogs) {
                        appData[selectedDateString].affirmationLogs = [];
                    }

                    // 3. Store the finished result directly in the isolated history pool
                    appData[selectedDateString].affirmationLogs.unshift({
                        time: timestampStr,
                        text: currentActiveAffirmation
                    });

                    syncData();
                    
                    // 4. Reset interface states
                    timerDisplay.classList.add('hidden');
                    resetAffirmationBlock();
                    renderAffirmationLogs();
                }
            }, 1000);
        }

        function cancelAffirmationTimer() {
            if (confirm("Cancel this 10-minute focus session?")) {
                clearInterval(affirmationCountdownInterval);
                document.getElementById('affirmation-timer-display').classList.add('hidden');
                currentActiveAffirmation = "";
                resetAffirmationBlock();
            }
        }

        function resetAffirmationBlock() {
            const cardContainer = document.getElementById('affirmation-interactive-zone');
            if (!cardContainer) return;
            cardContainer.innerHTML = `
                <input type="text" id="affirmation-input" placeholder="Wandering? Type what you are absolute in right now..." 
                    class="w-full bg-[#FAF9F6] border border-[#E5E4E2] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#C5A059]">
                <button onclick="startAffirmationTimer()" id="affirmation-btn" class="bg-[#2C2A29] text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#4A4744] transition flex-shrink-0">
                    Lock In
                </button>
            `;
            
            // Bind Enter-key listener to the new input element safely
            document.getElementById('affirmation-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') startAffirmationTimer();
            });
        }

        function renderAffirmationLogs() {
            const container = document.getElementById('affirmation-history-list');
            if (!container) return;
            container.innerHTML = '';

            if (!appData[selectedDateString].affirmationLogs) {
                appData[selectedDateString].affirmationLogs = [];
            }

            const logs = appData[selectedDateString].affirmationLogs;

            logs.forEach((log, index) => {
                container.innerHTML += `
                    <li class="bg-white border border-[#E5E4E2] p-3 rounded-xl flex items-center justify-between shadow-sm text-sm group transition-all">
                        <div class="flex items-center gap-2 min-w-0 flex-1">
                            <span class="text-[10px] font-mono font-bold tracking-wider text-amber-700 bg-amber-50 px-1.5 py-0.5 rounded flex-shrink-0">${log.time}</span>
                            <span class="text-gray-700 font-medium italic truncate leading-tight">${log.text}</span>
                        </div>
                        <button onclick="deleteAffirmationLog(${index})" class="text-gray-300 hover:text-red-400 text-xs px-2 py-1 transition flex-shrink-0">✕</button>
                    </li>`;
            });
        }

        function deleteAffirmationLog(index) {
            appData[selectedDateString].affirmationLogs.splice(index, 1);
            syncData();
            renderAffirmationLogs();
        }

        // Restore global state dropdown selection on load
        if (localStorage.getItem('curatedGlobalState')) {
            globalIdentityState = localStorage.getItem('curatedGlobalState');
            const selector = document.getElementById('state-selector');
            if (selector) selector.value = globalIdentityState;
        }

        document.getElementById('reminder-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addReminder();
        });

        renderCalendar();
        // Add this helper listener at the bottom initialization line of your script block
        document.getElementById('affirmation-input')?.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') startAffirmationTimer();
        });
    </script>
</body>
</html>
